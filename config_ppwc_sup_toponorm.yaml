BASE_DIRECTORY: 'train_out'
EXPERIMENT_NAME: 'sup_16k_rigidAug1-2_toponorm_v2'
NUM_WORKERS: 8
USE_AMP: False
DEVICE: 'cuda'
DATA:
  TOPO_CACHE_VERSION: 'v2'
  TOPO_NORMALIZATION: 'zscore'
  TOPO_STATS_PATH: 'topo_cache/Lung250MDataset/v2/train_stats.json'
  TOPO_NORM_EPS: 1.0e-6
MODEL:
  PPWC_SFPC_BN: False
  TOPO_FEAT_DIM: 6
SOLVER:
  BATCH_SIZE: 4
  NUM_EPOCHS: 1500
  LEARNING_RATE: 0.001
  SCHEDULER: 'multistep'
  LR_LAMBDA: 0.1
  LR_MILESTONES: [1200,1400]
  LOSS_FACTOR: 10.0
  TOPO_LOSS_WEIGHT: 0.1
  TOPO_LOSS_WARMUP_EPOCHS: 20
  TOPO_LOSS_K: 16
  TOPO_LOSS_NUM_ANCHORS: 512
  TOPO_LOSS_QUERY_CHUNK_SIZE: 128
  TOPO_LOSS_BETA: 0.01
INPUT:
  SCALE_NORM_FACTOR: 100
AUGMENTATIONS:
  METHOD: 'rigid_one'
  MAX_ROTATION_ANGLE: 10.
  MAX_SCALE_OFFSET: 0.0
  MAX_TRANSLATION: 0.005
